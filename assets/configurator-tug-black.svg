<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <g transform="translate(80, 120)">
    <!-- Pull tab / tug — black — realistic loop -->
    <!-- Tab loop -->
    <path d="
      M 248 6
      C 245 -8, 244 -20, 248 -28
      C 252 -34, 258 -36, 264 -36
      C 270 -36, 276 -34, 280 -28
      C 284 -20, 283 -8, 280 6
    " fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
    <!-- Tab body (connects to shaft) -->
    <path d="
      M 248 6
      L 248 16
      C 250 20, 256 22, 264 22
      C 272 22, 278 20, 280 16
      L 280 6
    " fill="#1a1a1a" stroke="#444" stroke-width="1.2"/>
    <!-- Inner hole of loop -->
    <ellipse cx="264" cy="-14" rx="8" ry="10" fill="#E8DFD0" opacity="0.6"/>
    <!-- Stitching -->
    <path d="M 252 -2 L 252 16" fill="none" stroke="#444" stroke-width="0.6" stroke-dasharray="1.5 1.5" opacity="0.5"/>
    <path d="M 276 -2 L 276 16" fill="none" stroke="#444" stroke-width="0.6" stroke-dasharray="1.5 1.5" opacity="0.5"/>
    <!-- Brand stamp impression -->
    <text x="264" y="14" text-anchor="middle" fill="#444" font-size="4" font-family="serif" font-style="italic" opacity="0.4">R.M.W</text>
  </g>
</svg>
