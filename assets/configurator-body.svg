<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <!-- R.M. Williams Chelsea Boot — Side Profile (facing left) -->
  <defs>
    <linearGradient id="bootShaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="35%" stop-color="#8B6340"/>
      <stop offset="65%" stop-color="#9B7350"/>
      <stop offset="100%" stop-color="#7A5530"/>
    </linearGradient>
    <linearGradient id="bootVamp" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#7A5530"/>
      <stop offset="50%" stop-color="#8B6340"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </linearGradient>
  </defs>

  <g transform="translate(80, 120)">
    <!-- Boot shaft (back/calf area) -->
    <path d="
      M 195 0
      C 192 0, 170 3, 165 8
      L 155 40
      L 148 100
      L 142 180
      L 138 240
      C 136 265, 135 280, 136 290
    " fill="url(#bootShaft)" stroke="#5C3A1E" stroke-width="1.8"/>

    <!-- Boot shaft (front/shin) -->
    <path d="
      M 330 0
      C 334 0, 348 5, 352 12
      L 355 40
      L 352 100
      L 346 180
      L 340 240
      C 338 265, 336 280, 334 290
    " fill="url(#bootShaft)" stroke="#5C3A1E" stroke-width="1.8"/>

    <!-- Shaft body fill -->
    <path d="
      M 195 0
      C 220 -6, 300 -6, 330 0
      L 352 12
      L 355 40
      L 352 100
      L 346 180
      L 340 240
      L 334 290
      L 136 290
      L 138 240
      L 142 180
      L 148 100
      L 155 40
      L 165 8
      Z
    " fill="url(#bootShaft)" stroke="none"/>

    <!-- Shaft top opening -->
    <ellipse cx="262" cy="2" rx="70" ry="8" fill="#5C3A1E" opacity="0.3"/>
    <path d="M 195 0 C 220 -6, 300 -6, 330 0" fill="none" stroke="#5C3A1E" stroke-width="2"/>

    <!-- Shaft interior shadow -->
    <path d="M 200 4 C 225 -2, 295 -2, 325 4 L 322 12 C 298 6, 228 6, 205 12 Z" fill="#4A2E14" opacity="0.4"/>

    <!-- Ankle area -->
    <path d="
      M 136 290
      C 132 310, 125 335, 118 355
      C 112 370, 100 390, 90 405
      L 334 290
    " fill="url(#bootVamp)" stroke="none"/>

    <!-- Vamp (front lower boot) -->
    <path d="
      M 334 290
      C 340 310, 342 340, 335 365
      C 325 400, 300 430, 260 450
      C 220 468, 165 472, 120 468
      C 95 465, 78 458, 68 448
      C 55 435, 48 418, 50 405
    " fill="url(#bootVamp)" stroke="#5C3A1E" stroke-width="1.5"/>

    <!-- Heel counter (back of boot) -->
    <path d="
      M 136 290
      C 130 310, 120 340, 110 365
      C 100 390, 90 405, 85 420
      L 80 440
      L 78 455
      L 85 460
    " fill="#7A5530" stroke="#5C3A1E" stroke-width="1.5"/>

    <!-- Full lower body fill -->
    <path d="
      M 136 290
      C 130 310, 120 340, 110 365
      C 100 390, 90 405, 85 420
      L 80 440
      L 78 458
      L 85 462
      L 120 468
      C 165 472, 220 468, 260 450
      C 300 430, 325 400, 335 365
      C 342 340, 340 310, 334 290
      Z
    " fill="url(#bootVamp)" stroke="none"/>

    <!-- Outer boot outline -->
    <path d="
      M 195 0
      C 192 0, 170 3, 165 8
      L 155 40
      L 148 100
      L 142 180
      L 138 240
      L 136 290
      C 130 310, 120 340, 110 365
      C 100 390, 90 405, 85 420
      L 80 440
      L 78 458
      L 85 462
      L 120 468
      C 165 472, 220 468, 260 450
      C 300 430, 325 400, 335 365
      C 342 340, 340 310, 334 290
      L 340 240
      L 346 180
      L 352 100
      L 355 40
      L 352 12
      C 348 5, 334 0, 330 0
      C 300 -6, 220 -6, 195 0
      Z
    " fill="none" stroke="#5C3A1E" stroke-width="2"/>

    <!-- Ankle crease line -->
    <path d="M 145 305 C 180 295, 280 290, 330 300" fill="none" stroke="#6B4226" stroke-width="1.2" opacity="0.35"/>

    <!-- Vamp crease line -->
    <path d="M 100 400 C 150 388, 250 382, 330 390" fill="none" stroke="#6B4226" stroke-width="1" opacity="0.3"/>

    <!-- Welt line (where upper meets sole) -->
    <path d="
      M 78 460
      L 85 465
      C 100 470, 160 476, 260 455
      C 310 442, 335 420, 342 395
    " fill="none" stroke="#5C3A1E" stroke-width="1.5" opacity="0.5"/>

    <!-- Shaft highlight (leather sheen) -->
    <path d="
      M 260 20
      C 258 60, 255 120, 250 200
      L 248 260
    " fill="none" stroke="#A08060" stroke-width="4" opacity="0.15" stroke-linecap="round"/>

    <!-- Back seam -->
    <path d="M 168 10 L 140 290" fill="none" stroke="#5C3A1E" stroke-width="1" opacity="0.25"/>

    <!-- Stitching along welt -->
    <path d="
      M 82 462
      C 100 468, 160 474, 255 454
      C 308 440, 334 418, 340 396
    " fill="none" stroke="#A08060" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.4"/>
  </g>
</svg>
