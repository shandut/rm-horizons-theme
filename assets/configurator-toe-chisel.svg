<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <g transform="translate(80, 120)">
    <!-- Chisel toe — angular, more pointed -->
    <path d="
      M 120 588
      C 90 585, 65 578, 50 565
      C 38 552, 30 535, 32 522
      C 33 514, 38 508, 48 505
    " fill="#7A5530" stroke="#5C3A1E" stroke-width="2" opacity="0.6"/>
    <!-- Extended point -->
    <path d="
      M 50 565
      C 42 558, 35 548, 32 538
      L 30 525
    " fill="none" stroke="#5C3A1E" stroke-width="2.5" opacity="0.8"/>
    <!-- Chisel edge line -->
    <path d="M 32 522 L 50 522" fill="none" stroke="#5C3A1E" stroke-width="1.2" opacity="0.5"/>
    <!-- Toe cap stitch -->
    <path d="
      M 125 580
      C 100 576, 75 568, 58 555
      C 45 544, 38 530, 40 520
    " fill="none" stroke="#A08060" stroke-width="0.8" stroke-dasharray="2.5 2.5" opacity="0.4"/>
  </g>
</svg>
